name: Release

on:
  push:
    tags:
      - 'v*'   # 推送 v 開頭的 tag（如 v0.1.0）即自動觸發發布

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check if version already published
        id: check-version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "package-name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already-published=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on npm, will skip publish"
          else
            echo "already-published=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found on npm, will publish"
          fi

      - name: Publish to npm
        if: steps.check-version.outputs.already-published != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
